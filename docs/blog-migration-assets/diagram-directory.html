<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    padding: 32px 40px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace;
    color: #e0e0e0;
  }
  .tree {
    max-width: 520px;
    margin: 0 auto;
  }
  .row {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 13.5px;
  }
  .prefix {
    color: #555;
    margin-right: 8px;
    user-select: none;
  }
  .icon {
    margin-right: 8px;
    font-size: 16px;
  }
  .name { font-weight: 500; }
  .comment {
    margin-left: auto;
    font-size: 12px;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    padding: 2px 10px;
    border-radius: 4px;
    white-space: nowrap;
  }

  /* Row styles */
  .row-old-electron {
    background: rgba(255, 100, 100, 0.06);
    border: 1px solid rgba(255, 100, 100, 0.15);
  }
  .row-old-electron .icon { color: #ff6b6b; }
  .row-old-electron .name { color: #ff9999; }
  .row-old-electron .comment { color: #ff8888; background: rgba(255,100,100,0.08); }

  .row-old-go {
    background: rgba(255, 180, 80, 0.06);
    border: 1px solid rgba(255, 180, 80, 0.15);
  }
  .row-old-go .icon { color: #ffb450; }
  .row-old-go .name { color: #ffc980; }
  .row-old-go .comment { color: #ffb060; background: rgba(255,180,80,0.08); }

  .row-new {
    background: rgba(80, 220, 120, 0.06);
    border: 1px solid rgba(80, 220, 120, 0.15);
  }
  .row-new .icon { color: #50dc78; }
  .row-new .name { color: #80f0a0; }
  .row-new .comment { color: #60d880; background: rgba(80,220,120,0.08); }
</style>
</head>
<body>
  <div class="tree">
    <div class="row row-old-electron">
      <span class="prefix">├──</span>
      <span class="icon">📁</span>
      <span class="name">lol-record-analysis-app/</span>
      <span class="comment">旧 Electron 前端（4 月废弃）</span>
    </div>
    <div class="row row-old-go">
      <span class="prefix">├──</span>
      <span class="icon">📁</span>
      <span class="name">lol-record-client-golang/</span>
      <span class="comment">旧 Go 后端（活到 12 月）</span>
    </div>
    <div class="row row-new">
      <span class="prefix">└──</span>
      <span class="icon">📁</span>
      <span class="name">lol-record-analysis-tauri/</span>
      <span class="comment">新 Tauri + Rust + Vue</span>
    </div>
  </div>
</body>
</html>
