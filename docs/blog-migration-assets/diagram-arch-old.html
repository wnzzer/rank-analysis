<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    padding: 32px 40px;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: #e0e0e0;
  }
  .layer {
    border-radius: 10px;
    padding: 20px 28px;
    margin: 0 auto;
    max-width: 560px;
    position: relative;
  }
  .layer-electron {
    background: linear-gradient(135deg, #2d2d44 0%, #1e1e36 100%);
    border: 1.5px solid #4a4a6a;
  }
  .layer-electron .layer-title {
    color: #7eb8ff;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .inner-box {
    background: rgba(126, 184, 255, 0.08);
    border: 1px dashed #5a8abf;
    border-radius: 6px;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .inner-box .label {
    font-size: 14px;
    color: #b8d4f0;
  }
  .inner-box .tag {
    font-size: 12px;
    color: #6a9fd8;
    background: rgba(106, 159, 216, 0.12);
    border-radius: 4px;
    padding: 2px 8px;
  }
  .arrow-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 10px 0;
  }
  .arrow-line {
    width: 2px;
    height: 18px;
    background: #666;
  }
  .arrow-head {
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid #666;
  }
  .arrow-label {
    font-size: 11px;
    color: #888;
    margin: 2px 0;
  }
  .layer-go {
    background: linear-gradient(135deg, #1a2e1a 0%, #162216 100%);
    border: 1.5px solid #3a6a3a;
  }
  .layer-go .layer-title {
    color: #5fd45f;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .layer-go .layer-items {
    font-size: 13px;
    color: #a0d0a0;
    line-height: 1.6;
    padding-left: 4px;
  }
  .layer-go .sub-tag {
    font-size: 11px;
    color: #5a9a5a;
    background: rgba(95, 212, 95, 0.1);
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 4px;
  }
  .layer-lcu {
    background: linear-gradient(135deg, #2e1a1a 0%, #221616 100%);
    border: 1.5px solid #6a3a3a;
  }
  .layer-lcu .layer-title {
    color: #ff8a8a;
    font-size: 15px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <!-- Layer 1: Electron -->
  <div class="layer layer-electron">
    <div class="layer-title">Electron 31 主进程</div>
    <div class="inner-box">
      <span class="label">Vue 3 + TDesign UI</span>
      <span class="tag">← 用户看到的界面</span>
    </div>
  </div>

  <!-- Arrow 1 -->
  <div class="arrow-col">
    <div class="arrow-label">fetch / axios</div>
    <div class="arrow-line"></div>
    <div class="arrow-label">localhost HTTP</div>
    <div class="arrow-head"></div>
  </div>

  <!-- Layer 2: Go -->
  <div class="layer layer-go">
    <div class="layer-title">Go HTTP Server (localhost:xxx) <span class="sub-tag">← 独立子进程</span></div>
    <div class="layer-items">
      <div>• LCU API client</div>
      <div>• 自动化逻辑 / 战绩聚合</div>
    </div>
  </div>

  <!-- Arrow 2 -->
  <div class="arrow-col">
    <div class="arrow-line"></div>
    <div class="arrow-label">HTTPS（LCU 自签证书）</div>
    <div class="arrow-head"></div>
  </div>

  <!-- Layer 3: LCU -->
  <div class="layer layer-lcu">
    <div class="layer-title">LeagueClientUx（LOL 客户端）</div>
  </div>
</body>
</html>
