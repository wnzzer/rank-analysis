# 临时 workflow：把 environment「TAURI_PRIVATE_KEY」里的 updater 签名私钥
# 用仓库所有者本地持有的一次性 RSA 公钥加密后导出为 artifact。
# 公开仓库的 artifact 任何人可下载，因此必须加密；只有本地私钥能解开。
# 恢复完成后立即删除本文件。
name: Recover Updater Key (temporary)

on:
  workflow_dispatch:

permissions: {}

jobs:
  recover:
    runs-on: ubuntu-latest
    environment: TAURI_PRIVATE_KEY
    steps:
      - name: Encrypt secret with owner cert
        env:
          KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "secret TAURI_PRIVATE_KEY is empty" >&2
            exit 1
          fi
