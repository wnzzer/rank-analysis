[changelog]
header = """
## 📅 Changes
"""
body = """
{% if version %}\
    {% if previous.version %}\
        ### [{{ version | trim_start_matches(pat="v") }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/{{ previous.version }}...{{ version }})
    {% else %}\
        ### {{ version | trim_start_matches(pat="v") }}
    {% endif %}\
{% else %}\
    ### [unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    #### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))\
          {% if commit.github.username %} by @{{ commit.github.username }}{%- endif -%}
    {% endfor %}
{% endfor %}
"""
trim = true
footer = """
"""

[git]
conventional_commits = true
filter_unconventional = false  # 保留非规范的 commit
split_commits = false
commit_parsers = [
    # 支持全角/半角冒号，以及可选的 (scope) 后缀(如 fix(arena): xxx)
    { message = "(?i)^feat(\\(.+?\\))?[：:]", group = "🚀 Features" },
    { message = "(?i)^fix(\\(.+?\\))?[：:]", group = "🐛 Bug Fixes" },
    { message = "(?i)^doc(\\(.+?\\))?[：:]", group = "📚 Documentation" },
    { message = "(?i)^perf(\\(.+?\\))?[：:]", group = "⚡ Performance" },
    { message = "(?i)^refactor(\\(.+?\\))?[：:]", group = "🛠 Refactor" },
    { message = "(?i)^style(\\(.+?\\))?[：:]", group = "🎨 Styling" },
    { message = "(?i)^test(\\(.+?\\))?[：:]", group = "🧪 Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "(?i)^chore(\\(.+?\\))?[：:]", skip = true },
    { body = ".*security", group = "🛡️ Security" },
    # 不匹配 conventional commit 格式的跳过
    { message = ".*", skip = true },
]
protect_breaking_commits = false
filter_commits = false  # 不过滤任何 commit
tag_pattern = "v?[0-9].*"
skip_tags = "beta|alpha"


ignore_tags = ""
sort_commits = "oldest"
